<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- App accent blue background, rounded -->
  <rect width="64" height="64" rx="12" ry="12" fill="#2a6dd9"/>

  <!-- Four ascending bars: a percentile distribution, with the rightmost
       (highest-rank) bar highlighted in green to evoke a top-percentile result -->
  <rect x="6"  y="44" width="10" height="14" rx="1.5" fill="#ffffff" opacity="0.5"/>
  <rect x="20" y="36" width="10" height="22" rx="1.5" fill="#ffffff" opacity="0.7"/>
  <rect x="34" y="26" width="10" height="32" rx="1.5" fill="#ffffff" opacity="0.88"/>
  <rect x="48" y="14" width="10" height="44" rx="1.5" fill="#34d399"/>
</svg>
